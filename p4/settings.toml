[paths]
corpus_path = "quijote/quijote.html"
artifacts_dir = "artifacts"
logs_dir = "logs"
chunks_filename = "chunks.json"
classical_index_filename = "classical_index.json"
semantic_embeddings_filename = "semantic_embeddings.npz"
semantic_manifest_filename = "semantic_manifest.json"

[preprocessing]
spacy_model = "es_core_news_lg"

[chunking]
target_words = 180
overlap_words = 45

[search]
top_k = 8
surface_weight = 0.35
lemma_weight = 0.65

[semantic]
batch_size = 32
index_version = 2
title_weight = 0.35
body_weight = 0.65
original_query_weight = 0.65
normalized_query_weight = 0.35
lexical_bonus_weight = 0.15
rerank_pool_size = 40

[ollama]
host = "http://127.0.0.1:11434"
timeout_seconds = 30

[rag]
enabled = true
generation_model = "qwen3:8b"
temperature = 0.2
num_predict = 384
hybrid_top_k = 5
max_sources = 4
max_context_chars = 6000
max_source_chars = 1400
classical_weight = 0.8
semantic_weight = 0.2
rrf_k = 10
min_score_ratio = 0.96
semantic_only_zero_overlap_penalty = 0.3
